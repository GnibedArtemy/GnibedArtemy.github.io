<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма обратной связи</title>
</head>
<body>
    <h1>Форма обратной связи</h1>
    <div class="container">
        <form action="https://httpbin.org/post" method="post"> <!--(1) Атрибут action - для того, чтобы понять, на какой ресурс мы отправляем данные. В данном случае это httpbin.org - специальный сайт. на который мы можем отправлять запросы с наших форм и смотреть результат. (5) Указываем метод "POST", чтобы иметь возможность отправлять-->
            <div class="form-group"> <!--(9) Создадим элементы для каждой группы полей-->
                <label for="name">ФИО</label> <!--(3) Для подписи к текстовому полю-->
                <input id="name" type="text" name="name" required> <!--(2) Самый рсапространенный тип поля формы для ввода текста (6) Атрибут name указывает, на то, как будет называться ваш параметр, колторый будет отправлен в запросе (8) Атрибут required - устанавливается как требование, чтобы значение поля не было пустым-->
            </div>
            <div class="form-group"> <!--(9)-->
                <label for="Email">Email</label> <!--(7)-->
                <input id="Email" type="email" name="email"> <!--(8) Для ввода адреса электронной почты-->
            </div>
            <input type="submit" value="Отправить"> <!--(4) Для создания кнопки, чтобы отправлять форму-->
        </form>
    </div>
</body>
</html>
