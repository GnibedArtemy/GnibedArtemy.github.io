<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма регистрации</title>
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/main.css">
</head>

<body>
    <header>
        <!--wrapper - обертка для ограничения по ширине и центрирования-->
        <div class="wrapper wrapper-flex">
            <a href="index.html">
                <img src="images/Logo.svg" alt="Логотип Midas">
            </a>

            <!--Интерактивное бургер-меню-->
            <label class="burger" for="toogle">
                <span></span>
                <span></span>
                <span></span>
            </label>
            <input type="checkbox" id="toogle">

            <nav class="menu">
                <ul>
                    <li><a href="#">Platform</a></li>
                    <li><a href="#">Midas Coin</a></li>
                    <li><a href="#">YAPs</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div class="wrapper">
            <h1>Registraiton form</h1>
            <!--Форма регистрации-->
            <form action="#">
                <fieldset>
                    <legend>User data</legend>
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="John Johnson" required>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="john@mail.com" required>
                </fieldset>
                <fieldset>
                    <legend>Password</legend>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </fieldset>
                <button type="submit">Submit</button>
                <button type="reset">reset</button>
            </form>
        </div>
    </main>
    <footer>
        <div class="wrapper">
            <nav class="footer-navigation">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Gallery</a></li>
                    <li><a href="#">Registraiton</a></li>
                    <li><a href="#utility">About</a></li>
                    <li><a href="#payout">Payment</a></li>
                </ul>
            </nav>
        </div>
    </footer>
</body>

</html>
